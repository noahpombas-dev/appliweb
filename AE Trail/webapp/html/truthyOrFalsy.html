<!DOCTYPE html>
<html>
<head>
  <title>Wahrheitswerte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fefefe;
      color: #111;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .container {
      background-color: #fff;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 100%;
    }
    h2 { text-align: center; margin-bottom: 15px; }
    pre {
      background-color: #111;
      color: #fefefe;
      padding: 15px;
      border-radius: 6px;
      font-size: 16px;
    }
    p { font-size: 18px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h2>0️⃣ Wahrheitswerte</h2>
  <pre>
let wert = 0;
let ergebnis;

if (wert) {
  ergebnis = "truthy";
} else {
  ergebnis = "falsy";
}

console.log(ergebnis);
  </pre>
  <p>Frage: Was wird ausgegeben? (truthy/falsy)</p>
</div>
</body>
</html>
