<!DOCTYPE html>
<html>
<head>
  <title>Finale Aufgabe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fefefe;
      color: #111;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .card {
      background-color: #fff;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      max-width: 450px;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin: 12px 0;
    }

    .hint {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>🔐 Code knacken</h2>

  <p>4 + "1" = ?</p>
  <p>"2" - 1 = ?</p>
  <p>"1" + "3" = ?</p>
  <p>1 + "4" = ?</p>

  <p><strong>Rechne die resultaten zusammen.</strong></p>
  <p class="hint">Du kannst auch Notizen machen!</p>
</div>

</body>
</html>
