<!DOCTYPE html>
<html>
<head>
  <title>Schleifen Aufgabe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fefefe;
      color: #111;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      background-color: #fff;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .container:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    pre {
      background-color: #111;
      color: #fefefe;
      padding: 15px;
      border-radius: 6px;
      font-size: 16px;
      overflow-x: auto;
    }

    p {
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🧠 Schleifen verstehen</h2>

  <pre>
for (let i = 0; i &lt; 3; i++) {
  console.log("Hi");
}
  </pre>

  <p>Frage: Wie oft wird "Hi" angezeigt?</p>
</div>

</body>
</html>
