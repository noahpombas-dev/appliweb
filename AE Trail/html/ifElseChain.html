<!DOCTYPE html>
<html>
<head>
  <title>If Else Kette</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fefefe;
      color: #111;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .container {
      background-color: #fff;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 100%;
    }
    h2 { text-align: center; margin-bottom: 15px; }
    pre {
      background-color: #111;
      color: #fefefe;
      padding: 15px;
      border-radius: 6px;
      font-size: 16px;
    }
    p { font-size: 18px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h2>🔀 If Else Kette</h2>
  <pre>
let punkte = 75;
let note;

if (punkte >= 90) {
  note = "a";
} else if (punkte >= 80) {
  note = "b";
} else if (punkte >= 70) {
  note = "c";
} else if (punkte >= 60) {
  note = "d";
} else {
  note = "f";
}

console.log(note);
  </pre>
  <p>Frage: Was wird ausgegeben?</p>
</div>
</body>
</html>
